<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Surprise for Tooba</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="interaction-viewer">
        <button id="start-btn" onclick="startSequence()">Tooba, Click to Start the Magic</button>
    </div>

    <div id="flower-stage" class="hidden">
        <svg id="rose-svg" viewBox="0 0 100 100" class="hidden-flower">
            <defs>
                <radialGradient id="roseGradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ff4d6d" />
                    <stop offset="100%" stop-color="#c9184a" />
                </radialGradient>
            </defs>
            <path id="rose-stem" d="M50,100 L50,50" stroke="#2d6a4f" stroke-width="3" fill="none" />
            <g id="rose-petals" transform="translate(50, 50) scale(0)">
                <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#roseGradient)" transform="rotate(0)" />
                <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#roseGradient)" transform="rotate(72)" />
                <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#roseGradient)" transform="rotate(144)" />
                <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#roseGradient)" transform="rotate(216)" />
                <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#roseGradient)" transform="rotate(288)" />
            </g>
        </svg>

        <svg id="sunflower-svg" viewBox="0 0 100 100" class="hidden-flower">
            <path id="sunflower-stem" d="M50,100 L50,60" stroke="#1e4620" stroke-width="4" fill="none" />
            <g id="sunflower-head" transform="translate(50, 60) scale(0)">
                <circle cx="0" cy="0" r="10" fill="#543a20" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(0)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(45)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(90)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(135)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(180)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(225)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(270)" />
                <ellipse cx="0" cy="0" rx="6" ry="18" fill="#ffb703" transform="rotate(315)" />
            </g>
        </svg>
    </div>

    <div id="final-message" class="hidden">
        <h1 class="glow-text">Happy Birthday, Tooba!</h1>
        <p>You deserve a beautiful day! 🌸</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
