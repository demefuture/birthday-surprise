<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Big Surprise for Tooba!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="interface-viewer">
        <div class="message-box">
            <h1>Hey Tooba!</h1>
            <p>I have a *very* large surprise waiting for you.</p>
            <p>Ready?</p>
            <button id="start-btn" onclick="startSurprise()">Yes, show me!</button>
        </div>
    </div>

    <canvas id="balloon-stage" class="hidden"></canvas>

    <div id="final-message" class="hidden">
        <h1 class="glow">Happy Birthday, Tooba! 🎂</h1>
        <p>You deserve all the balloons in the world.</p>
        <p class="decoration">✨🎈🎁🎈✨</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
